server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/users/**, /api/teachers/**, /api/students/**
        - id: course-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/courses/**, /api/classes/**, /api/enrollments/**, /api/attendance/**, /api/materials/**, /api/reschedules/**, /api/calendar/**
        - id: assignment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/assignments/**, /api/submissions/**, /api/earnings/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
