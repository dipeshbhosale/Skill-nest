server:
  port: 8083

spring:
  application:
    name: course-service

# JWT Configuration
jwt:
  secret: skill-nest-jwt-secret-key-2026-very-long-and-secure-key-for-signing-tokens
  expiration: 86400000  # 24 hours in ms

# Firebase Configuration
firebase:
  config-path: classpath:firebase-service-account.json
  database-url: https://tick-c8465-default-rtdb.firebaseio.com
  credentials-base64: ${FIREBASE_CREDENTIALS_BASE64:}

# CORS
cors:
  allowed-origins: http://localhost:5173,http://localhost:5174
